<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>بطاقات العيد</title>
  <link rel="stylesheet" href="css/style.css" />
</head>
<body>

  <header class="header">
    <h1>بطاقات العيد</h1>
    <p>اختر التصميم اللي يعجبك 🎨، أضف اسمك ✍️، احفظ بطاقة التهنئة 💌، وشاركها مع أحبابك بكل حب ❤️</p>
  </header>

  <main class="main">

    <!-- Card Selection -->
    <section class="selection-section">
      <h2 class="section-title">اختر التصميم</h2>
      <div id="cardGrid" class="card-grid" role="list"></div>
    </section>

    <!-- Preview & Personalization -->
    <section class="preview-section">
      <h2 class="section-title">معاينة</h2>

      <div class="preview-wrapper">
        <canvas id="previewCanvas"></canvas>
      </div>

      <div class="input-group">
        <label for="nameInput">اكتب اسمك هنا</label>
        <input
          type="text"
          id="nameInput"
          placeholder="Your Name"
          maxlength="30"
          autocomplete="off"
        />
      </div>

      <div class="btn-row">
        <button id="downloadBtn" class="btn btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" y1="15" x2="12" y2="3"/></svg>
          حمل التهنئة
        </button>
        <button id="printBtn" class="btn btn-secondary">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="6 9 6 2 18 2 18 9"/><path d="M6 18H4a2 2 0 0 1-2-2v-5a2 2 0 0 1 2-2h16a2 2 0 0 1 2 2v5a2 2 0 0 1-2 2h-2"/><rect x="6" y="14" width="12" height="8"/></svg>
          طباعة
        </button>
      </div>
    </section>

  </main>

  <footer class="footer">
    بطاقات التهنئة © 2026 — صُنع بـ ❤️ من قِبل <a href="https://www.linkedin.com/in/meshari-albashiri/" target="_blank" rel="noopener">Meshari Albashiri</a>
  </footer>

  <script src="js/config.js"></script>
  <script src="js/app.js"></script>

</body>
</html>
